<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="magdy">
    <meta name="description" content="Career opportunities at StepZero">
    <meta name="keywords" content="jobs, careers, stepzero">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers StepZero</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="manifest" href="/manifest.json">
</head>

<body>
    <div id="site-header"></div>

    <!-- hero section -->
    <section class="container-fluid overflow-hidden px-0 mx-aut position-relative w-100 object-fit-cover"
        style="width: 100%; height:850px;">
        <img src="./img/Frame 1000005404.png" loading="lazy" alt="img" decoding="sync"
            style="max-inline-size:100%;block-size:auto;aspect-ratio:2/1;object-fit:cover;height:850px;width:100%;"
            class="img-fluid px-0 mx-0 position-relative" />
        <div class="text-center overlay1 z-1 overflow-hidden">
            <div class="border-0 position-absolute bottom-50 start-50 translate-middle z-1">
                <h2 class="card-title fw-bold mx-aut px-5 fontF text-center pt-3 d-none d-sm-block">الوظائف</h2>
                <h5 class="card-text fontF fw-normal text-center mb-0 pb-0 pt-4 d-none d-sm-block">انضم إلى فريقنا وتمتع
                    بفرص نمو مهنية رائعة.</h5>
                <a href="./careers.html" class="btn fw-semibold icon-link icon-link-hover text-white fontF">
                    <img src="./img/Arrow Left.svg" alt="imgs"
                        class="img-fluid bg-white p-1 border border-secondary-subtle rounded-1" />
                    تعرف علي المزيد
                </a>
            </div>
        </div>
        <div class="wev1 z-1">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
                <path fill="#ffffff" fill-opacity="1" d="M0,128L1440,224L1440,320L0,320Z"></path>
            </svg>
        </div>
    </section>

    <!-- job listings placeholder -->
    <section class="container py-5">
        <h2 class="text-center fw-bold fontF mb-4">الوظائف المتاحة</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title fontF">مسوّق رقمي</h5>
                        <p class="card-text fontF">نبحث عن مسوّق رقمي ذو خبرة في إدارة حملات سوشيال ميديا.</p>
                        <a href="mailto:jobs@stepzero.sa" class="btn btn-primary fontF">قدّم الآن</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <!-- Bootstrap bundle (includes Popper) from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>

    <!-- Swiper JS -->

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
</body>

</html>
